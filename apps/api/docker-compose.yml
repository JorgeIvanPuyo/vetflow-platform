services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    depends_on:
      - db
    environment:
      APP_ENV: development
      APP_PORT: "8000"
      DATABASE_URL: postgresql://vetflow:vetflow@db:5432/vetflow
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID:-}"
      FIREBASE_SERVICE_ACCOUNT_JSON: "${FIREBASE_SERVICE_ACCOUNT_JSON:-}"
      FIREBASE_SERVICE_ACCOUNT_JSON_PATH: "${FIREBASE_SERVICE_ACCOUNT_JSON_PATH:-}"
      CLINICAL_FILES_BUCKET_NAME: ""
      MAX_CLINICAL_FILE_SIZE_MB: "25"
      AI_FEATURES_ENABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: vetflow
      POSTGRES_PASSWORD: vetflow
      POSTGRES_DB: vetflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_vetflow_data:/var/lib/postgresql/data

volumes:
  postgres_vetflow_data:
